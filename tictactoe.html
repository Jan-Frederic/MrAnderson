<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    h1 {
      margin-bottom: 0.5rem;
    }
    #status {
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 1.8rem;
      margin-bottom: 1rem;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 6rem);
      grid-template-rows: repeat(3, 6rem);
      gap: 0.4rem;
    }
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: #eef;
    }
    .cell.taken {
      cursor: default;
    }
    .cell.x { color: #e64; }
    .cell.o { color: #06c; }
    .cell.win { background: #dfd; }
    #restart {
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    #restart:hover { background: #f0f0f0; }
    nav {
      margin-top: 2rem;
      font-size: 1rem;
    }
    nav a { color: #06c; margin: 0 0.5rem; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status"></div>
  <div id="board"></div>
  <button id="restart">New game</button>
  <nav>
    <a href="index.html">Home</a>
    <a href="hangman.html">Hangman</a>
  </nav>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6],
    ];

    let board, current, over;

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    function render(winLine = []) {
      const cells = document.querySelectorAll(".cell");
      cells.forEach((cell, i) => {
        cell.textContent = board[i] ?? "";
        cell.className = "cell" +
          (board[i] ? ` taken ${board[i].toLowerCase()}` : "") +
          (winLine.includes(i) ? " win" : "");
      });

      const result = checkWinner();
      const statusEl = document.getElementById("status");
      if (result) {
        statusEl.textContent = result.winner ? `${result.winner} wins! 🎉` : "It's a draw!";
      } else {
        statusEl.textContent = `Player ${current}'s turn`;
      }
    }

    function handleClick(i) {
      if (over || board[i]) return;
      board[i] = current;
      const result = checkWinner();
      if (result) {
        over = true;
        render(result.line);
      } else {
        current = current === "X" ? "O" : "X";
        render();
      }
    }

    function buildBoard() {
      const boardEl = document.getElementById("board");
      boardEl.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.addEventListener("click", () => handleClick(i));
        boardEl.appendChild(cell);
      }
    }

    function newGame() {
      board = Array(9).fill(null);
      current = "X";
      over = false;
      buildBoard();
      render();
    }

    document.getElementById("restart").addEventListener("click", newGame);
    newGame();
  </script>
</body>
</html>
