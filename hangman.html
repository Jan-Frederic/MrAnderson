<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    h1 {
      margin-bottom: 0.5rem;
    }
    #word {
      font-size: 2.5rem;
      letter-spacing: 0.5rem;
      margin: 1.5rem 0;
      font-family: monospace;
    }
    #guesses {
      margin-bottom: 1rem;
      min-height: 1.5rem;
    }
    #message {
      min-height: 1.5rem;
      font-weight: bold;
    }
    #keyboard {
      display: grid;
      grid-template-columns: repeat(9, 2.5rem);
      gap: 0.4rem;
      margin-top: 1rem;
    }
    button.key {
      padding: 0.6rem 0;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    button.key:disabled {
      opacity: 0.4;
      cursor: default;
    }
    #restart {
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>Hangman</h1>
  <div id="word"></div>
  <div id="guesses"></div>
  <div id="message"></div>
  <div id="keyboard"></div>
  <button id="restart">New game</button>

  <script>
    const WORDS = ["python", "javascript", "hangman", "github", "developer", "computer", "keyboard", "internet"];
    const MAX_WRONG = 6;

    let word, guessed, wrongCount;

    function pickWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function render() {
      const wordEl = document.getElementById("word");
      wordEl.textContent = word
        .split("")
        .map((letter) => (guessed.has(letter) ? letter : "_"))
        .join(" ");

      const wrongLetters = [...guessed].filter((l) => !word.includes(l));
      document.getElementById("guesses").textContent =
        wrongLetters.length ? `Wrong guesses: ${wrongLetters.join(", ")} (${wrongCount}/${MAX_WRONG})` : "";

      const messageEl = document.getElementById("message");
      const won = word.split("").every((l) => guessed.has(l));
      const lost = wrongCount >= MAX_WRONG;

      if (won) {
        messageEl.textContent = "You win!";
      } else if (lost) {
        messageEl.textContent = `You lost! The word was "${word}".`;
      } else {
        messageEl.textContent = "";
      }

      document.querySelectorAll("#keyboard button").forEach((btn) => {
        if (won || lost || guessed.has(btn.textContent)) {
          btn.disabled = true;
        }
      });
    }

    function guess(letter) {
      if (guessed.has(letter)) return;
      guessed.add(letter);
      if (!word.includes(letter)) wrongCount++;
      render();
    }

    function buildKeyboard() {
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";
      for (let i = 97; i <= 122; i++) {
        const letter = String.fromCharCode(i);
        const btn = document.createElement("button");
        btn.className = "key";
        btn.textContent = letter;
        btn.addEventListener("click", () => guess(letter));
        keyboard.appendChild(btn);
      }
    }

    function newGame() {
      word = pickWord();
      guessed = new Set();
      wrongCount = 0;
      buildKeyboard();
      render();
    }

    document.getElementById("restart").addEventListener("click", newGame);
    newGame();
  </script>
</body>
</html>
